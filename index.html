<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haneul Palette</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: 'Noto Sans', sans-serif;
    background: #f5f3ef;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
}

button {
    padding: 12px 20px;
    background: black;
    color: white;
    border: none;
    margin-top: 15px;
    cursor: pointer;
    border-radius: 6px;
}

.result {
    display: none;
    margin-top: 20px;
    background: #fafafa;
    padding: 15px;
    text-align: left;
    border-radius: 8px;
}

/* PDF STYLE (HIDDEN) */
.page {
    width: 800px;
    background: #ffffff;
    padding: 50px;
}

.header {
    text-align: center;
}

.logo {
    width: 80px;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
}

.subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 40px;
}

.section-title {
    font-family: 'Playfair Display', serif;
    margin-top: 20px;
}

.palette {
    display: flex;
    gap: 10px;
}

.color {
    width: 60px;
    height: 60px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" width="80">

<h2>Signature Style Analysis</h2>

<input type="file" id="imageInput" accept="image/*">
<br>
<button onclick="analyze()">Analyze</button>

<div id="preview" class="result"></div>

<button id="fullBtn" style="display:none;" onclick="generatePDF()">
View Full Report
</button>

</div>

<!-- 🔥 PDF TEMPLATE -->
<div id="report" class="page" style="display:none;">

<div class="header">
    <img src="logo.png" class="logo">
    <div class="title">HANEUL PALETTE</div>
    <div class="subtitle">Personal Colour Analysis</div>
</div>

<div>
    <b>Undertone:</b> <span id="undertone"></span><br>
    <b>Season:</b> <span id="season"></span>
</div>

<div class="section-title">Best Colours</div>
<div class="palette" id="palette"></div>

<div class="section-title">Recommendations</div>
<div id="recommend"></div>

<div class="section-title">Avoid</div>
<div id="avoid"></div>

</div>

<script>

let resultData = {};

function analyze(){

    const file = document.getElementById("imageInput").files[0];

    if(!file){
        alert("Upload image first");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const img = new Image();
        img.src = e.target.result;

        img.onload = function(){

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.drawImage(img, 0, 0);

            const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

            let total = 0;

            for(let i=0;i<data.length;i+=4){
                total += (data[i]+data[i+1]+data[i+2])/3;
            }

            let avg = total/(data.length/4);

            let season, undertone, harmony, colors;

            if(avg > 170){
                season = "Light Spring";
                undertone = "Warm";
                harmony = "Light, fresh tones enhance clarity";
                colors = ["#FAD6A5","#FFE5B4","#FFF2CC"];
            }
            else if(avg > 120){
                season = "Soft Autumn";
                undertone = "Warm-Neutral";
                harmony = "Muted earthy tones create balance";
                colors = ["#A67B5B","#C2A083","#E6C7A8"];
            }
            else{
                season = "Deep Winter";
                undertone = "Cool";
                harmony = "Deep rich tones create contrast";
                colors = ["#2C2C54","#3A3A6A","#1B1B3A"];
            }

            resultData = {season, undertone, harmony, colors};

            document.getElementById("preview").innerText =
`PREVIEW

Season: ${season}
Undertone: ${undertone}

Dominant Harmony:
${harmony}`;

            document.getElementById("preview").style.display = "block";
            document.getElementById("fullBtn").style.display = "inline-block";
        }
    }

    reader.readAsDataURL(file);
}

function generatePDF(){

    document.getElementById("season").innerText = resultData.season;
    document.getElementById("undertone").innerText = resultData.undertone;

    document.getElementById("recommend").innerText =
    "Wear tones that align with your natural harmony for a refined appearance.";

    document.getElementById("avoid").innerText =
    "Avoid colors that overpower your natural balance.";

    let palette = document.getElementById("palette");
    palette.innerHTML = "";

    resultData.colors.forEach(c=>{
        let div = document.createElement("div");
        div.className="color";
        div.style.background=c;
        palette.appendChild(div);
    });

    html2pdf().from(document.getElementById("report")).save("Haneul_Palette_Report.pdf");
}

</script>

</body>
</html>
