<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Haneul Palette</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h1>Signature Style Profile</h1>

    <input type="file" id="imageUpload">

    <button onclick="analyze()">Analyze</button>

    <!-- 🔥 PREVIEW (ONLY 3 RESULTS) -->
    <div id="preview" class="hidden">

        <h2>Quick Style Signals</h2>

        <p>Undertone: <span id="p1"></span></p>
        <p>Season: <span id="p2"></span></p>
        <p>Contrast: <span id="p3"></span></p>

        <button onclick="openReport()">View Full Report</button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
