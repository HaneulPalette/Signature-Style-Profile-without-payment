<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Haneul Palette</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>Signature Style Profile</h2>

<input type="file" id="img">

<button onclick="analyze()">Analyze</button>

<div id="preview" style="display:none">

<h3>Preview</h3>

<p>Undertone: <span id="p1"></span></p>
<p>Season: <span id="p2"></span></p>
<p>Contrast: <span id="p3"></span></p>

<button onclick="openReport()">View Full Report</button>

</div>

</div>

<script>

let result = {};

function analyze(){

    let file = document.getElementById("img").files[0];
    if(!file){ alert("Upload image"); return; }

    let img = new Image();
    let reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = function(){

        let canvas = document.createElement("canvas");
        let ctx = canvas.getContext("2d");

        canvas.width = 100;
        canvas.height = 100;

        ctx.drawImage(img,0,0,100,100);

        let data = ctx.getImageData(0,0,100,100).data;

        let r=0,g=0,b=0,count=0;

        for(let i=0;i<data.length;i+=4){
            r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++;
        }

        r/=count; g/=count; b/=count;

        let brightness=(r+g+b)/3;
        let contrast = Math.abs(r-g)+Math.abs(g-b);

        let undertone = r>b ? "Warm":"Cool";

        let season;

        // 16-season simplified logic
        if(undertone==="Warm" && brightness>180) season="Light Spring";
        else if(undertone==="Warm" && contrast>80) season="Bright Spring";
        else if(undertone==="Warm" && brightness<120) season="Deep Autumn";
        else if(undertone==="Warm") season="Soft Autumn";

        else if(undertone==="Cool" && brightness>180) season="Light Summer";
        else if(undertone==="Cool" && contrast>80) season="Bright Winter";
        else if(undertone==="Cool" && brightness<120) season="Deep Winter";
        else season="Soft Summer";

        result = {undertone,season,contrast};

        document.getElementById("p1").innerText=undertone;
        document.getElementById("p2").innerText=season;
        document.getElementById("p3").innerText=contrast>80?"High":"Low";

        document.getElementById("preview").style.display="block";
    };

    reader.readAsDataURL(file);
}

function openReport(){
    localStorage.setItem("reportData", JSON.stringify(result));
    window.open("luxury-report.html");
}

</script>

</body>
</html>
