<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Haneul Palette</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>Signature Style Profile</h2>

<input type="file" id="img">
<button onclick="analyze()">Analyze</button>

<div id="preview" style="display:none">
<h3>Preview</h3>
<p>Undertone: <span id="p1"></span></p>
<p>Season: <span id="p2"></span></p>
<p>Contrast: <span id="p3"></span></p>

<button onclick="openReport()">View Full Report</button>
</div>

</div>

<script>

let result={};

function analyze(){

let file=document.getElementById("img").files[0];
if(!file){alert("Upload image");return;}

let img=new Image();
let reader=new FileReader();

reader.onload=e=>img.src=e.target.result;

img.onload=function(){

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=100;
canvas.height=100;

ctx.drawImage(img,0,0,100,100);

let data=ctx.getImageData(0,0,100,100).data;

let r=0,g=0,b=0,count=0;

for(let i=0;i<data.length;i+=4){
r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++;
}

r/=count; g/=count; b/=count;

let brightness=(r+g+b)/3;
let contrast=Math.abs(r-g)+Math.abs(g-b);

let undertone=r>b?"Warm":"Cool";

let season;

// 16-season logic (improved distribution)
if(undertone==="Warm" && brightness>180 && contrast<60) season="Light Spring";
else if(undertone==="Warm" && brightness>170 && contrast>80) season="Bright Spring";
else if(undertone==="Warm" && contrast>110) season="Warm Spring";
else if(undertone==="Warm" && brightness<120 && contrast>80) season="Deep Autumn";
else if(undertone==="Warm" && contrast<60) season="Soft Autumn";
else season="Muted Autumn";

if(undertone==="Cool" && brightness>180 && contrast<60) season="Light Summer";
else if(undertone==="Cool" && brightness>170) season="Cool Summer";
else if(undertone==="Cool" && contrast<60) season="Soft Summer";
else if(undertone==="Cool" && contrast>120) season="Bright Winter";
else if(undertone==="Cool" && brightness<120) season="Deep Winter";
else season="True Winter";

result={
undertone:undertone,
season:season,
contrast:contrast>80?"High":"Low"
};

document.getElementById("p1").innerText=result.undertone;
document.getElementById("p2").innerText=result.season;
document.getElementById("p3").innerText=result.contrast;

document.getElementById("preview").style.display="block";

};

reader.readAsDataURL(file);
}

function openReport(){
localStorage.setItem("reportData",JSON.stringify(result));
window.open("luxury-report.html","_blank");
}

</script>

</body>
</html>
