<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haneul Palette</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<div class="title">HANEUL PALETTE</div>
<div class="subtitle">Signature Style Profile</div>

<div class="upload-box">
<input type="file" id="img" accept="image/*">
<br>
<button onclick="analyze()">Analyze</button>
</div>

<div id="preview" class="preview">
    <h3>Preview</h3>
    <p><b>Undertone:</b> <span id="p1"></span></p>
    <p><b>Season:</b> <span id="p2"></span></p>
    <p><b>Contrast:</b> <span id="p3"></span></p>

    <button class="download-btn" onclick="goToReport()">Get Full Report</button>
</div>

</div>

<script>

function analyze(){

let file = document.getElementById("img").files[0];

if(!file){
    alert("Upload image first");
    return;
}

let img = new Image();
let reader = new FileReader();

reader.onload = e => img.src = e.target.result;

img.onload = function(){

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.width = 200;
canvas.height = 200;

ctx.drawImage(img,0,0,200,200);

// center sampling
let data = ctx.getImageData(60,60,80,80).data;

let r=0,g=0,b=0,count=0;

for(let i=0;i<data.length;i+=4){
r+=data[i];
g+=data[i+1];
b+=data[i+2];
count++;
}

r/=count; g/=count; b/=count;

// analysis
let brightness=(r+g+b)/3;
let diffRG=r-g;
let diffRB=r-b;

let undertone;
if(diffRB>15 && diffRG>10) undertone="Warm";
else if(diffRB<-15) undertone="Cool";
else undertone="Neutral";

let contrastVal=Math.max(r,g,b)-Math.min(r,g,b);
let contrast=contrastVal>50?"High":"Low";

let season;

if(undertone==="Warm"){
if(brightness>170 && contrast==="Low") season="Light Spring";
else if(brightness>150 && contrast==="High") season="Bright Spring";
else if(brightness<120 && contrast==="High") season="Deep Autumn";
else if(contrast==="Low") season="Soft Autumn";
else season="Warm Autumn";
}

else if(undertone==="Cool"){
if(brightness>170 && contrast==="Low") season="Light Summer";
else if(brightness>150 && contrast==="High") season="Bright Winter";
else if(brightness<120 && contrast==="High") season="Deep Winter";
else if(contrast==="Low") season="Soft Summer";
else season="Cool Summer";
}

else{
if(brightness>150) season="Soft Summer";
else season="Soft Autumn";
}

let result={
undertone:undertone,
season:season,
contrast:contrast
};

localStorage.setItem("reportData",JSON.stringify(result));

// preview
document.getElementById("p1").innerText=undertone;
document.getElementById("p2").innerText=season;
document.getElementById("p3").innerText=contrast;

document.getElementById("preview").style.display="block";

};

reader.readAsDataURL(file);
}

function goToReport(){
window.location.href="luxury-report.html";
}

</script>

</body>
</html>
