<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haneul Palette - Analysis</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo">

    <h1>Signature Style Profile</h1>
    <p>Upload your image to reveal your visual harmony</p>

    <input type="file" id="imageUpload" accept="image/*">

    <button onclick="analyze()">Analyze</button>

    <!-- 🔥 PREVIEW SECTION -->
    <div id="preview" class="preview hidden">

        <h2>Quick Insights</h2>

        <div class="card">
            <p><b>Undertone:</b> <span id="pUndertone"></span></p>
            <p><b>Season:</b> <span id="pSeason"></span></p>
            <p><b>Contrast Level:</b> <span id="pContrast"></span></p>
        </div>

        <button onclick="openReport()">View Full Signature Report</button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
