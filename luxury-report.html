<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{background:#f5f3ef;font-family:'Noto Sans';margin:0;}
.page{width:850px;margin:auto;background:#fff;padding:50px;}

.title{
font-family:'Playfair Display';
text-align:center;
font-size:34px;
}

.section{margin-bottom:30px;}
.section-title{
font-family:'Playfair Display';
font-size:18px;
border-bottom:1px solid #eee;
margin-bottom:10px;
}

.card{
background:#fafafa;
padding:18px;
border-radius:10px;
line-height:1.6;
}

.palette{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
}

.color-box{text-align:center;}
.color{width:55px;height:55px;border-radius:8px;margin:auto;}
.hex{font-size:11px;}
.name{font-size:11px;color:#666;}
</style>
</head>

<body>

<div id="report" class="page">

<div class="title">HANEUL PALETTE</div>

<div class="section card">
<b>Undertone:</b> <span id="undertone"></span><br>
<b>Season:</b> <span id="season"></span><br>
<b>Contrast:</b> <span id="contrast"></span><br><br>
<span id="analysisText"></span>
</div>

<div class="section">
<div class="section-title">Your Refined Colour Palette</div>
<div id="palette" class="palette"></div>
</div>

<div class="section card">
<b>Formal:</b><br><span id="formal"></span><br><br>
<b>Casual:</b><br><span id="casual"></span>
</div>

<div class="section card" id="grooming"></div>

<div class="section card">
<b>Do:</b><br><span id="do"></span><br><br>
<b>Avoid:</b><br><span id="avoid"></span>
</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

// 🔥 GENERATE 25 COLORS BASED ON SEASON FAMILY
function generatePalette(season){

let baseWarm=["#A67B5B","#C2A083","#E6C7A8","#8B6F47","#B08968"];
let baseCool=["#6FA3EF","#A7C7E7","#C3D9F1","#8BB8D4","#B0D0E8"];

let arr = season.includes("Autumn") || season.includes("Spring") ? baseWarm : baseCool;

let result=[];

for(let i=0;i<25;i++){
let c=arr[i % arr.length];
result.push({hex:c,name:"Custom Shade "+(i+1)});
}

return result;
}

// CONTENT
function getContent(season,undertone,contrast){
return {
analysis:`You have a ${undertone} undertone with ${contrast} contrast placing you in ${season}.`,
formal:`Structured outfits using your palette enhance elegance.`,
casual:`Use 2–3 harmonious colors.`,
grooming:`${undertone==="Warm"?"Golden/caramel":"Ash/cool"} tones suit best.`,
do:`Stay within palette.`,
avoid:`Avoid opposite undertone colors.`
};
}

function loadReport(){

let d=JSON.parse(localStorage.getItem("reportData"));

document.getElementById("undertone").innerText=d.undertone;
document.getElementById("season").innerText=d.season;
document.getElementById("contrast").innerText=d.contrast;

let c=getContent(d.season,d.undertone,d.contrast);

document.getElementById("analysisText").innerText=c.analysis;
document.getElementById("formal").innerText=c.formal;
document.getElementById("casual").innerText=c.casual;
document.getElementById("grooming").innerText=c.grooming;
document.getElementById("do").innerText=c.do;
document.getElementById("avoid").innerText=c.avoid;

let box=document.getElementById("palette");
box.innerHTML="";

generatePalette(d.season).forEach(c=>{
let wrap=document.createElement("div");
wrap.className="color-box";

let div=document.createElement("div");
div.className="color";
div.style.background=c.hex;

let hex=document.createElement("div");
hex.className="hex";
hex.innerText=c.hex;

let name=document.createElement("div");
name.className="name";
name.innerText=c.name;

wrap.appendChild(div);
wrap.appendChild(hex);
wrap.appendChild(name);

box.appendChild(wrap);
});

}

function downloadPDF(){
html2pdf().from(document.getElementById("report")).save("Haneul_Report.pdf");
}

window.onload=loadReport;

</script>

</body>
</html>
