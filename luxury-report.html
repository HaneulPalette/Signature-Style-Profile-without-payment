<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {background:#f5f3ef;font-family:'Noto Sans';margin:0;}

.page {width:800px;margin:auto;background:white;padding:50px;}

.title {font-family:'Playfair Display';font-size:34px;text-align:center;}
.subtitle {text-align:center;color:#777;margin-bottom:30px;}

.section {margin-bottom:30px;}
.section-title {font-family:'Playfair Display';border-bottom:1px solid #eee;}

.card {background:#fafafa;padding:15px;border-radius:10px;}

.palette {display:flex;flex-wrap:wrap;gap:8px;}
.color {width:45px;height:45px;border-radius:6px;}
</style>
</head>

<body>

<div id="report" class="page">

<div class="title">HANEUL PALETTE</div>
<div class="subtitle">Luxury Signature Style Report</div>

<!-- PROFILE -->
<div class="section">
<div class="section-title">Client Profile</div>
<div class="card">
Undertone: <span id="undertone"></span><br>
Season: <span id="season"></span><br>
Contrast: <span id="contrast"></span>
</div>
</div>

<!-- PALETTE -->
<div class="section">
<div class="section-title">Your Refined Colour Palette</div>
<div id="palette" class="palette"></div>
</div>

<!-- FORMAL -->
<div class="section">
<div class="section-title">Formal Styling</div>
<div class="card" id="formal"></div>
</div>

<!-- CASUAL -->
<div class="section">
<div class="section-title">Casual Styling</div>
<div class="card" id="casual"></div>
</div>

<!-- GROOMING -->
<div class="section">
<div class="section-title">Grooming Recommendations</div>
<div class="card" id="grooming"></div>
</div>

<!-- DO -->
<div class="section">
<div class="section-title">What Works For You</div>
<div class="card" id="do"></div>
</div>

<!-- DONT -->
<div class="section">
<div class="section-title">What To Avoid</div>
<div class="card" id="avoid"></div>
</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

// 🎨 20–30 COLOR PALETTES
function getPalette(season){

return {
"Bright Spring":[
"#FF5A36","#FFD700","#00FA9A","#FF69B4","#FFA07A",
"#FF4500","#7FFF00","#FF7F50","#FFE066","#C1FF72",
"#FF8C42","#FF6F61","#FFCC33","#FF9966","#F4C542",
"#E3A857","#FFD27F","#FFE135","#BFFF00","#FFB347"
],

"Soft Autumn":[
"#A67B5B","#C2A083","#E6C7A8","#8B6F47","#B08968",
"#DDB892","#7F5539","#F5E6CC","#6B4F4F","#C9A27E",
"#A98467","#D6CCC2","#B08968","#CB997E","#EDDCD2",
"#B7B7A4","#A5A58D","#6B705C","#B5838D","#9C6644"
],

"Light Summer":[
"#DCE6F1","#E3EDF7","#BFD7EA","#C9D6DF","#A9BCD0",
"#EAF2F8","#D0E1F9","#B8C6D1","#E5ECF4","#C3D3E3",
"#B0C4DE","#ADD8E6","#87CEFA","#AFEEEE","#E0FFFF",
"#F0F8FF","#F5F5F5","#F8F8FF","#F0FFFF","#F5FFFA"
],

"True Winter":[
"#000000","#FFFFFF","#FF0000","#0000FF","#00FF00",
"#FF00FF","#00FFFF","#1C1C1C","#2F2F2F","#3A3A3A",
"#8B0000","#000080","#191970","#483D8B","#2F4F4F",
"#708090","#778899","#B22222","#DC143C","#4169E1"
]

}[season] || ["#ccc"];
}


// 🎯 PERSONALIZED TEXT
function getContent(season){

if(season.includes("Spring")){
return {
formal:"Bright, fresh colors with gold accents suit formal wear.",
casual:"Use light, vibrant colors for relaxed styling.",
grooming:"Warm brown or golden tones for hair.",
do:"Use lively, clear shades.",
avoid:"Avoid dull or overly dark tones."
};
}

if(season.includes("Summer")){
return {
formal:"Soft cool tones and pastel palettes enhance elegance.",
casual:"Use muted and airy colors.",
grooming:"Ash tones suit best.",
do:"Stick to soft, blended shades.",
avoid:"Avoid harsh contrast."
};
}

if(season.includes("Autumn")){
return {
formal:"Earthy tones and rich textures work best.",
casual:"Use warm, muted tones.",
grooming:"Deep brown and auburn shades suit.",
do:"Use warm, grounded colors.",
avoid:"Avoid cool icy tones."
};
}

return {
formal:"High contrast bold colors suit formal wear.",
casual:"Use sharp, clean colors.",
grooming:"Dark tones suit best.",
do:"Use bold contrast.",
avoid:"Avoid muted shades."
};
}


function loadReport(){

let d = JSON.parse(localStorage.getItem("reportData"));

document.getElementById("undertone").innerText = d.undertone;
document.getElementById("season").innerText = d.season;
document.getElementById("contrast").innerText = d.contrast;

// palette
let box = document.getElementById("palette");
getPalette(d.season).forEach(c=>{
let div=document.createElement("div");
div.className="color";
div.style.background=c;
box.appendChild(div);
});

// content
let c = getContent(d.season);

document.getElementById("formal").innerText = c.formal;
document.getElementById("casual").innerText = c.casual;
document.getElementById("grooming").innerText = c.grooming;
document.getElementById("do").innerText = c.do;
document.getElementById("avoid").innerText = c.avoid;

}

function downloadPDF(){
html2pdf().from(document.getElementById("report")).save("Haneul_Palette_Report.pdf");
}

window.onload = loadReport;

</script>

</body>
</html>
