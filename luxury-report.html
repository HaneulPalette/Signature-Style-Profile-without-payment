<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haneul Palette Luxury Report</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* GLOBAL FIX */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #f5f3ef;
    font-family: 'Noto Sans', sans-serif;
    -webkit-print-color-adjust: exact;
}

/* A4 SAFE PAGE */
.page {
    width: 794px;
    min-height: 1123px;
    margin: auto;
    background: #ffffff;
    padding: 60px 50px;
}

/* HEADER */
.header {
    text-align: center;
}

.logo {
    width: 80px;
    margin-bottom: 10px;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
}

.subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 40px;
}

/* SECTIONS */
.section {
    margin-bottom: 30px;
    page-break-inside: avoid;
}

.section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    border-bottom: 1px solid #e5e5e5;
    margin-bottom: 10px;
}

.card {
    background: #fafafa;
    padding: 15px;
    border-radius: 10px;
}

/* PALETTE FIX (PDF SAFE) */
.palette {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
}

.color-box {
    width: 18%;
    margin-bottom: 15px;
    text-align: center;
    font-size: 11px;
    page-break-inside: avoid;
}

.color {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    margin: auto;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 40px;
}

</style>
</head>

<body>

<div id="report" class="page">

<div class="header">
<img src="logo.png" class="logo">
<div class="title">HANEUL PALETTE</div>
<div class="subtitle">Luxury Colour Identity</div>
</div>

<div class="section">
<div class="section-title">Client Profile</div>
<div class="card">
Undertone: <span id="undertone"></span><br>
Season: <span id="season"></span><br>
Contrast: <span id="contrast"></span>
</div>
</div>

<div class="section">
<div class="section-title">Refined Seasonal Palette</div>
<div id="palette" class="palette"></div>
</div>

<div class="section">
<div class="section-title">Style Guidance</div>
<div class="card">
<b>Formal:</b> <span id="formal"></span><br><br>
<b>Casual:</b> <span id="casual"></span><br><br>
<b>Grooming:</b> <span id="grooming"></span>
</div>
</div>

<div class="section">
<div class="section-title">Do’s & Don’ts</div>
<div class="card">
✔ <span id="do"></span><br>
✖ <span id="avoid"></span>
</div>
</div>

<div class="footer">
© Haneul Palette
</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

/* ================= 16 SEASONS ================= */
function getPalette(season){
const p={
"Soft Autumn":["#A67B5B","#C2A083","#E6C7A8","#8B6F47","#B08968","#DDB892","#7F5539","#F5E6CC","#6B4F4F","#C9A27E","#A98467","#D6CCC2","#CB997E","#EDDCD2","#B7B7A4","#A5A58D","#6B705C","#B5838D","#9C6644","#FFE8D6"],
"Cool Summer":["#6FA3EF","#A7C7E7","#C3D9F1","#8BB8D4","#B0D0E8","#D0E4F5","#7A9CC6","#5F7FA3","#6C7A89","#95A5A6","#BDC3C7","#D5DBDB","#EBF5FB","#F4F6F7","#AED6F1","#85C1E9","#5DADE2","#3498DB","#2E86C1","#1B4F72"]
};
return p[season] || p["Soft Autumn"];
}

/* ================= CONTENT ================= */
function getContent(season){
return {
formal:"Tailored outfits using your seasonal palette.",
casual:"Combine 2–3 palette colors.",
grooming:"Hair/beard tones aligned with undertone.",
do:"Stay within your palette.",
avoid:"Avoid opposite season tones."
};
}

/* ================= LOAD ================= */
window.onload=function(){

let d=JSON.parse(localStorage.getItem("reportData"));

document.getElementById("undertone").innerText=d.undertone;
document.getElementById("season").innerText=d.season;
document.getElementById("contrast").innerText=d.contrast;

/* Palette */
let paletteBox=document.getElementById("palette");

getPalette(d.season).forEach(hex=>{
let box=document.createElement("div");
box.className="color-box";

let c=document.createElement("div");
c.className="color";
c.style.background=hex;

let txt=document.createElement("div");
txt.innerText=hex;

box.appendChild(c);
box.appendChild(txt);
paletteBox.appendChild(box);
});

/* Content */
let c=getContent(d.season);

document.getElementById("formal").innerText=c.formal;
document.getElementById("casual").innerText=c.casual;
document.getElementById("grooming").innerText=c.grooming;
document.getElementById("do").innerText=c.do;
document.getElementById("avoid").innerText=c.avoid;

};

/* ================= PDF FIX ================= */
function downloadPDF(){

setTimeout(() => {

const element = document.getElementById("report");

html2pdf().set({
    margin: 0.3,
    filename: 'Haneul_Palette_Report.pdf',
    image: { type: 'jpeg', quality: 1 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
})
.from(element)
.save();

}, 500);

}

</script>

</body>
</html>
