<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haneul Palette Luxury Report</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* GLOBAL FIX */
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #f5f3ef;
    font-family: 'Noto Sans', sans-serif;
    -webkit-print-color-adjust: exact;
}

/* A4 PERFECT SIZE */
.page {
    width: 794px;
    min-height: 1123px;
    margin: auto;
    background: #fff;
    padding: 60px 50px;
}

/* HEADER */
.header { text-align: center; }
.logo { width: 80px; margin-bottom: 10px; }
.title { font-family: 'Playfair Display'; font-size: 34px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 40px; }

/* SECTIONS */
.section {
    margin-bottom: 30px;
    page-break-inside: avoid;
}

.section-title {
    font-family: 'Playfair Display';
    font-size: 20px;
    border-bottom: 1px solid #ddd;
    margin-bottom: 10px;
}

.card {
    background: #fafafa;
    padding: 15px;
    border-radius: 10px;
}

/* PERFECT PDF SAFE PALETTE */
.palette {
    display: block;
}

.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
}

.color-box {
    width: 18%;
    text-align: center;
    font-size: 11px;
}

.color {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    margin: auto;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 40px;
}

</style>
</head>

<body>

<div id="report" class="page">

<div class="header">
<img src="logo.png" class="logo">
<div class="title">HANEUL PALETTE</div>
<div class="subtitle">Luxury Colour Identity</div>
</div>

<div class="section">
<div class="section-title">Client Profile</div>
<div class="card">
Undertone: <span id="undertone"></span><br>
Season: <span id="season"></span><br>
Contrast: <span id="contrast"></span>
</div>
</div>

<div class="section">
<div class="section-title">Refined Seasonal Palette</div>
<div id="palette" class="palette"></div>
</div>

<div class="section">
<div class="section-title">Style Guidance</div>
<div class="card">
Formal: <span id="formal"></span><br><br>
Casual: <span id="casual"></span><br><br>
Grooming: <span id="grooming"></span>
</div>
</div>

<div class="section">
<div class="section-title">Do’s & Don’ts</div>
<div class="card">
✔ <span id="do"></span><br>
✖ <span id="avoid"></span>
</div>
</div>

<div class="footer">© Haneul Palette</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

return palettes[season];
}

/* RENDER PALETTE IN PERFECT ROWS */
function renderPalette(colors){

let container=document.getElementById("palette");
container.innerHTML="";

for(let i=0;i<colors.length;i+=5){

let row=document.createElement("div");
row.className="row";

colors.slice(i,i+5).forEach(hex=>{
let box=document.createElement("div");
box.className="color-box";

let c=document.createElement("div");
c.className="color";
c.style.background=hex;

let txt=document.createElement("div");
txt.innerText=hex;

box.appendChild(c);
box.appendChild(txt);
row.appendChild(box);
});

container.appendChild(row);
}

}

/* LOAD */
window.onload=function(){

let d=JSON.parse(localStorage.getItem("reportData"));

document.getElementById("undertone").innerText=d.undertone;
document.getElementById("season").innerText=d.season;
document.getElementById("contrast").innerText=d.contrast;

renderPalette(getPalette(d.season));

}

/* PDF PERFECT FIX */
function downloadPDF(){
setTimeout(()=>{
html2pdf().set({
margin:0.3,
filename:'Haneul_Report.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'a4'}
}).from(document.getElementById("report")).save();
},800);
}

</script>

</body>
</html>
