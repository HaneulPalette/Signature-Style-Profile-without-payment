<!DOCTYPE html>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #f5f3ef;
    font-family: 'Noto Sans', sans-serif;
}

.page {
    width: 794px;
    min-height: 1123px;
    margin: auto;
    background: #fff;
    padding: 60px 50px;
}

.header { text-align: center; }
.logo { width: 80px; margin-bottom: 10px; }
.title { font-family: 'Playfair Display'; font-size: 34px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 40px; }

.section { margin-bottom: 30px; }

.section-title {
    font-family: 'Playfair Display';
    font-size: 20px;
    border-bottom: 1px solid #ddd;
    margin-bottom: 10px;
}

.card {
    background: #fafafa;
    padding: 15px;
    border-radius: 10px;
}

/* GRID FIXED FOR PDF */
.palette {
    display: flex;
    flex-wrap: wrap;
}

.color-box {
    width: 20%;
    text-align: center;
    margin-bottom: 15px;
    font-size: 11px;
}

.color {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    margin: auto;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 40px;
}
</style>
</head>

<body>

<div id="report" class="page">

<div class="header">
<img src="logo.png" class="logo">
<div class="title">HANEUL PALETTE</div>
<div class="subtitle">Luxury Colour Identity</div>
</div>

<div class="section">
<div class="section-title">Client Profile</div>
<div class="card">
Undertone: <span id="undertone"></span><br>
Season: <span id="season"></span><br>
Contrast: <span id="contrast"></span>
</div>
</div>

<div class="section">
<div class="section-title">Refined Seasonal Palette</div>
<div id="palette" class="palette"></div>
</div>

<div class="section">
<div class="section-title">Style Guidance</div>
<div class="card">
<b>Formal:</b> <span id="formal"></span><br><br>
<b>Casual:</b> <span id="casual"></span><br><br>
<b>Grooming:</b> <span id="grooming"></span>
</div>
</div>

<div class="section">
<div class="section-title">Do’s & Don’ts</div>
<div class="card">
✔ <span id="do"></span><br>
✖ <span id="avoid"></span>
</div>
</div>

<div class="footer">© Haneul Palette</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>

/* PREMIUM STYLE CONTENT */
function getContent(season){

return {

formal:
"Choose structured outfits in 2–3 coordinated tones. Use darker shades from your palette for base pieces (blazer, trousers) and lighter tones for shirts. Avoid mixing unrelated color temperatures.",

casual:
"Combine relaxed fits with 2 harmonious palette colors. For example: earthy top + neutral bottom. Keep contrast moderate to maintain a polished look.",

grooming:
"Hair and beard should stay within your undertone. Warm undertone → golden brown shades. Cool undertone → ash tones. Avoid jet black or overly artificial dye.",

do:
"Stick to your seasonal palette, maintain color harmony, and balance light vs dark elements in every outfit.",

avoid:
"Avoid neon colors, overly bright contrasts, and shades outside your undertone (e.g., cool tones for warm skin)."

};
}

/* RENDER */
function renderPalette(colors){
let container=document.getElementById("palette");
container.innerHTML="";

colors.forEach(hex=>{
let box=document.createElement("div");
box.className="color-box";

let c=document.createElement("div");
c.className="color";
c.style.background=hex;

let txt=document.createElement("div");
txt.innerText=hex;

box.appendChild(c);
box.appendChild(txt);
container.appendChild(box);
});
}

/* LOAD */
window.onload=function(){

let d = getData();

document.getElementById("undertone").innerText = d.undertone;
document.getElementById("season").innerText = d.season;
document.getElementById("contrast").innerText = d.contrast;

renderPalette(getPalette(d.season));

let c = getContent(d.season);

document.getElementById("formal").innerText = c.formal;
document.getElementById("casual").innerText = c.casual;
document.getElementById("grooming").innerText = c.grooming;
document.getElementById("do").innerText = c.do;
document.getElementById("avoid").innerText = c.avoid;

}

/* PDF FIX */
function downloadPDF(){
setTimeout(()=>{
html2pdf().set({
margin:0.3,
filename:'Haneul_Report.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'a4'}
}).from(document.getElementById("report")).save();
},1000);
}
