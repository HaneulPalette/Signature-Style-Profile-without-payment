<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haneul Palette Luxury Report</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #f5f3ef;
    font-family: 'Noto Sans', sans-serif;
    -webkit-print-color-adjust: exact;
}

.page {
    width: 794px;
    min-height: 1123px;
    margin: auto;
    background: #fff;
    padding: 60px 50px;
}

.header { text-align: center; }
.logo { width: 80px; margin-bottom: 10px; }
.title { font-family: 'Playfair Display'; font-size: 34px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 40px; }

.section {
    margin-bottom: 30px;
    page-break-inside: avoid;
}

.section-title {
    font-family: 'Playfair Display';
    font-size: 20px;
    border-bottom: 1px solid #ddd;
    margin-bottom: 10px;
}

.card {
    background: #fafafa;
    padding: 15px;
    border-radius: 10px;
}

.palette { display: block; }

.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
}

.color-box {
    width: 18%;
    text-align: center;
    font-size: 11px;
}

.color {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    margin: auto;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 40px;
}
</style>
</head>

<body>

<div id="report" class="page">

<div class="header">
<img src="logo.png" class="logo">
<div class="title">HANEUL PALETTE</div>
<div class="subtitle">Luxury Colour Identity</div>
</div>

<div class="section">
<div class="section-title">Client Profile</div>
<div class="card">
Undertone: <span id="undertone"></span><br>
Season: <span id="season"></span><br>
Contrast: <span id="contrast"></span>
</div>
</div>

<div class="section">
<div class="section-title">Refined Seasonal Palette</div>
<div id="palette" class="palette"></div>
</div>

<div class="section">
<div class="section-title">Style Guidance</div>
<div class="card">
Formal: <span id="formal"></span><br><br>
Casual: <span id="casual"></span><br><br>
Grooming: <span id="grooming"></span>
</div>
</div>

<div class="section">
<div class="section-title">Do’s & Don’ts</div>
<div class="card">
✔ <span id="do"></span><br>
✖ <span id="avoid"></span>
</div>
</div>

<div class="footer">© Haneul Palette</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

/* (UNCHANGED) getPalette() — your full 16 seasons already here */


/* ✅ FULL 16-SEASON STYLE GUIDANCE (ADDED) */
function getContent(season){

const data = {

/* SPRING */
"Light Spring":{
formal:"Light beige, peach, and soft gold outfits.",
casual:"Pastel tops with cream trousers.",
grooming:"Light golden brown tones.",
do:"Use light warm shades.",
avoid:"Avoid dark colors."
},
"Warm Spring":{
formal:"Golden beige, coral outfits.",
casual:"Warm bright styles.",
grooming:"Golden brown tones.",
do:"Use rich warm tones.",
avoid:"Avoid cool tones."
},
"Bright Spring":{
formal:"Bright bold contrast outfits.",
casual:"Vibrant color mixes.",
grooming:"High contrast styling.",
do:"Use bright colors.",
avoid:"Avoid muted tones."
},
"Soft Spring":{
formal:"Muted peach and beige.",
casual:"Soft warm neutrals.",
grooming:"Soft brown tones.",
do:"Use soft tones.",
avoid:"Avoid harsh contrast."
},

/* SUMMER */
"Light Summer":{
formal:"Light blue and lavender outfits.",
casual:"Pastel combinations.",
grooming:"Ash tones.",
do:"Use cool light shades.",
avoid:"Avoid warm colors."
},
"Cool Summer":{
formal:"Blue, grey, navy outfits.",
casual:"Soft denim looks.",
grooming:"Cool toned hair.",
do:"Use cool tones.",
avoid:"Avoid orange tones."
},
"Soft Summer":{
formal:"Muted pink and grey outfits.",
casual:"Soft neutral wear.",
grooming:"Ash tones.",
do:"Use muted shades.",
avoid:"Avoid bright colors."
},
"True Summer":{
formal:"Classic cool blue and white.",
casual:"Clean cool outfits.",
grooming:"Neutral cool tones.",
do:"Stay cool toned.",
avoid:"Avoid warmth."
},

/* AUTUMN */
"Warm Autumn":{
formal:"Brown, rust, mustard outfits.",
casual:"Earth tones.",
grooming:"Warm brown hair.",
do:"Use earthy shades.",
avoid:"Avoid cool tones."
},
"Deep Autumn":{
formal:"Dark brown, olive outfits.",
casual:"Rich dark wear.",
grooming:"Deep tones.",
do:"Use depth.",
avoid:"Avoid light colors."
},
"Muted Autumn":{
formal:"Soft brown muted tones.",
casual:"Neutral earthy wear.",
grooming:"Muted tones.",
do:"Use soft colors.",
avoid:"Avoid brightness."
},
"Soft Autumn":{
formal:"Beige, taupe, dusty peach.",
casual:"Soft warm neutrals.",
grooming:"Light brown tones.",
do:"Stay muted.",
avoid:"Avoid neon."
},

/* WINTER */
"Bright Winter":{
formal:"Black with bold contrast colors.",
casual:"High contrast outfits.",
grooming:"Sharp dark tones.",
do:"Use contrast.",
avoid:"Avoid muted shades."
},
"Cool Winter":{
formal:"Navy, icy blue outfits.",
casual:"Cool clean looks.",
grooming:"Cool dark tones.",
do:"Use cool shades.",
avoid:"Avoid warmth."
},
"Deep Winter":{
formal:"Black, burgundy outfits.",
casual:"Dark neutral styles.",
grooming:"Deep tones.",
do:"Use depth.",
avoid:"Avoid light tones."
},
"True Winter":{
formal:"Black, white and red.",
casual:"Sharp contrast looks.",
grooming:"High contrast styling.",
do:"Use clear tones.",
avoid:"Avoid muted colors."
}

};

return data[season] || {
formal:"Use balanced tones from your palette.",
casual:"Combine 2–3 palette colors.",
grooming:"Natural tones.",
do:"Stay within palette.",
avoid:"Avoid extremes."
};
}


/* (UNCHANGED) renderPalette() */


/* LOAD */
window.onload=function(){

let d=JSON.parse(localStorage.getItem("reportData"));

document.getElementById("undertone").innerText=d.undertone;
document.getElementById("season").innerText=d.season;
document.getElementById("contrast").innerText=d.contrast;

renderPalette(getPalette(d.season));

/* ✅ ADDED CONNECTION */
let c = getContent(d.season);

document.getElementById("formal").innerText = c.formal;
document.getElementById("casual").innerText = c.casual;
document.getElementById("grooming").innerText = c.grooming;
document.getElementById("do").innerText = c.do;
document.getElementById("avoid").innerText = c.avoid;

}

/* (UNCHANGED) PDF */
function downloadPDF(){
setTimeout(()=>{
html2pdf().set({
margin:0.3,
filename:'Haneul_Report.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'a4'}
}).from(document.getElementById("report")).save();
},800);
}

</script>

</body>
</html>
