<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{background:#f5f3ef;font-family:'Noto Sans';margin:0;}
.page{width:800px;margin:auto;background:#fff;padding:50px;}
.title{font-family:'Playfair Display';font-size:32px;text-align:center;}
.section{margin-bottom:30px;}
.card{background:#fafafa;padding:15px;border-radius:10px;}
.palette{display:flex;flex-wrap:wrap;gap:8px;}
.color{width:45px;height:45px;border-radius:6px;}
</style>

</head>

<body>

<div id="report" class="page">

<div class="title">HANEUL PALETTE</div>

<div class="section card">
Undertone: <span id="undertone"></span><br>
Season: <span id="season"></span><br>
Contrast: <span id="contrast"></span>
</div>

<div class="section">
<div class="palette" id="palette"></div>
</div>

<div class="section card">
<b>Formal:</b> <span id="formal"></span><br><br>
<b>Casual:</b> <span id="casual"></span>
</div>

<div class="section card" id="grooming"></div>

<div class="section card">
<b>Do:</b> <span id="do"></span><br><br>
<b>Avoid:</b> <span id="avoid"></span>
</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

// 16 SEASON PALETTE
function getPalette(season){
return {

"Light Spring":["#FFF1CC","#FFE4B5","#FFFACD","#FFEBCD","#FDEBD0","#FFF5E1","#FAF0BE","#FFEFD5","#FFF8DC","#F5DEB3"],
"Warm Spring":["#FFAA33","#FFCC66","#FF9966","#FFD27F","#FFB84D","#F4C542","#E3A857","#FFCC99","#E6A44C","#FF9F1C"],
"Bright Spring":["#FF5A36","#FFD700","#00FA9A","#FF69B4","#FFA07A","#FF4500","#7FFF00","#FF7F50","#FFE066","#FF9966"],
"Soft Spring":["#FAD7A0","#F5CBA7","#F8C471","#F0B27A","#E59866","#DC7633","#F7DC6F","#F9E79F","#FDEBD0","#E6B0AA"],

"Light Summer":["#DCE6F1","#E3EDF7","#BFD7EA","#C9D6DF","#A9BCD0","#EAF2F8","#D0E1F9","#B8C6D1","#E5ECF4","#C3D3E3"],
"Cool Summer":["#6FA3EF","#A7C7E7","#C3D9F1","#8BB8D4","#B0D0E8","#D0E4F5","#7A9CC6","#E6F0FA","#5F7FA3","#9CBEDC"],
"Soft Summer":["#A8B5C0","#C3CED6","#E0E6EB","#8FA3B0","#B0C4CF","#D6DEE3","#7C8B97","#F2F4F6","#6D7C88","#9FB3C1"],
"True Summer":["#7FB3D5","#A9CCE3","#D4E6F1","#85C1E9","#AED6F1","#EBF5FB","#5DADE2","#3498DB","#2E86C1","#1B4F72"],

"Soft Autumn":["#A67B5B","#C2A083","#E6C7A8","#8B6F47","#B08968","#DDB892","#7F5539","#F5E6CC","#6B4F4F","#C9A27E"],
"Warm Autumn":["#8B4000","#A0522D","#CD853F","#D2691E","#B5651D","#6E260E","#7B3F00","#8B5A2B","#C68642","#D2B48C"],
"Deep Autumn":["#3B2F2F","#5C4033","#6B4423","#8B5E3C","#A0522D","#4E342E","#3E2723","#7B3F00","#5D3A00","#6E260E"],
"Muted Autumn":["#A38F85","#B7A99A","#C9B8A8","#8C7B75","#B5A69A","#D2C1B0","#7E6C63","#E3D5C9","#6F5F57","#A4948A"],

"Bright Winter":["#FFFFFF","#000","#FF0000","#0000FF","#00FF00","#FF00FF","#00FFFF","#DC143C","#1E90FF","#7FFF00"],
"Cool Winter":["#0A0A0A","#FFFFFF","#1E90FF","#4682B4","#7B68EE","#8A2BE2","#4169E1","#00BFFF","#2F4F4F","#708090"],
"Deep Winter":["#000","#1A1A1A","#2B2B2B","#3C3C3C","#4D4D4D","#660000","#003366","#000080","#2E0854","#191970"],
"True Winter":["#000","#fff","#FF0000","#0000FF","#00FF00","#FF00FF","#00FFFF","#8B0000","#000080","#191970"]

}[season] || ["#ccc"];
}


// CONTENT LOGIC
function getContent(season){

if(season.includes("Spring")){
return {formal:"Bright warm tones with gold accents.",
casual:"Fresh vibrant colors.",
grooming:"Golden brown tones.",
do:"Use lively shades.",
avoid:"Avoid dull dark colors."};
}

if(season.includes("Summer")){
return {formal:"Soft cool tones and pastels.",
casual:"Muted airy colors.",
grooming:"Ash tones.",
do:"Use soft shades.",
avoid:"Avoid harsh contrast."};
}

if(season.includes("Autumn")){
return {formal:"Rich earthy tones.",
casual:"Warm muted shades.",
grooming:"Auburn tones.",
do:"Use grounded colors.",
avoid:"Avoid icy colors."};
}

return {formal:"High contrast bold colors.",
casual:"Sharp clean tones.",
grooming:"Dark tones.",
do:"Use strong contrast.",
avoid:"Avoid muted colors."};
}


// LOAD REPORT
function loadReport(){

let raw=localStorage.getItem("reportData");

if(!raw){
alert("No data found");
return;
}

let d=JSON.parse(raw);

document.getElementById("undertone").innerText=d.undertone;
document.getElementById("season").innerText=d.season;
document.getElementById("contrast").innerText=d.contrast;

let box=document.getElementById("palette");
box.innerHTML="";

getPalette(d.season).forEach(c=>{
let div=document.createElement("div");
div.className="color";
div.style.background=c;
box.appendChild(div);
});

let c=getContent(d.season);

document.getElementById("formal").innerText=c.formal;
document.getElementById("casual").innerText=c.casual;
document.getElementById("grooming").innerText=c.grooming;
document.getElementById("do").innerText=c.do;
document.getElementById("avoid").innerText=c.avoid;
}

function downloadPDF(){
html2pdf().from(document.getElementById("report")).save("Haneul_Report.pdf");
}

window.onload=loadReport;

</script>

</body>
</html>
