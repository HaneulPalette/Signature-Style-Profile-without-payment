<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Noto+Sans&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{background:#f5f3ef;font-family:'Noto Sans';margin:0;}
.page{width:800px;margin:auto;background:#fff;padding:50px;}
.title{text-align:center;font-family:'Playfair Display';font-size:30px;}
.section{margin-bottom:25px;}
.card{background:#fafafa;padding:15px;border-radius:10px;}

.palette{display:flex;flex-wrap:wrap;gap:10px;}

.color-box{text-align:center;width:80px;}
.color{width:50px;height:50px;border-radius:6px;margin:auto;}
.hex{font-size:10px;}
.name{font-size:10px;color:#555;}
</style>
</head>

<body>

<div id="report" class="page">

<div class="title">HANEUL PALETTE</div>

<div class="section card">
Undertone: <span id="undertone"></span><br>
Season: <span id="season"></span><br>
Contrast: <span id="contrast"></span>
</div>

<div class="section">
<div id="palette" class="palette"></div>
</div>

<div class="section card">
<b>Formal:</b> <span id="formal"></span><br><br>
<b>Casual:</b> <span id="casual"></span>
</div>

<div class="section card" id="grooming"></div>

<div class="section card">
<b>Do:</b> <span id="do"></span><br><br>
<b>Avoid:</b> <span id="avoid"></span>
</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

// 🔥 SAMPLE FULL STRUCTURE (extendable)
function getPalette(season){

let baseColors=[
{hex:"#A67B5B",name:"Warm Taupe"},
{hex:"#C2A083",name:"Soft Beige"},
{hex:"#E6C7A8",name:"Peach Cream"},
{hex:"#8B6F47",name:"Muted Brown"},
{hex:"#B08968",name:"Clay"},
{hex:"#DDB892",name:"Sand"},
{hex:"#7F5539",name:"Earth Brown"},
{hex:"#F5E6CC",name:"Light Cream"},
{hex:"#6B4F4F",name:"Dusty Rose"},
{hex:"#C9A27E",name:"Warm Nude"},
{hex:"#A98467",name:"Caramel"},
{hex:"#D6CCC2",name:"Soft Ivory"},
{hex:"#CB997E",name:"Blush Brown"},
{hex:"#EDDCD2",name:"Pale Peach"},
{hex:"#B7B7A4",name:"Muted Sage"},
{hex:"#A5A58D",name:"Olive Gray"},
{hex:"#6B705C",name:"Dark Olive"},
{hex:"#B5838D",name:"Muted Mauve"},
{hex:"#9C6644",name:"Rust"},
{hex:"#FFE8D6",name:"Light Peach"}
];

// 👉 for now using structured palette for all seasons
return baseColors;
}

// 🔥 CONTENT
function getContent(season,undertone,contrast){

return {
formal:`Your ${contrast} contrast and ${undertone} undertone suit structured outfits.`,
casual:`Use 2–3 harmonious colors from your palette.`,
grooming:`${undertone==="Warm"?"Golden & caramel":"Ash & cool"} tones suit hair/beard.`,
do:`Stay within ${season} palette.`,
avoid:`Avoid opposite undertone colors.`
};
}

// LOAD
function loadReport(){

let d=JSON.parse(localStorage.getItem("reportData"));

document.getElementById("undertone").innerText=d.undertone;
document.getElementById("season").innerText=d.season;
document.getElementById("contrast").innerText=d.contrast;

let box=document.getElementById("palette");
box.innerHTML="";

getPalette(d.season).forEach(c=>{
let wrap=document.createElement("div");
wrap.className="color-box";

let div=document.createElement("div");
div.className="color";
div.style.background=c.hex;

let hex=document.createElement("div");
hex.className="hex";
hex.innerText=c.hex;

let name=document.createElement("div");
name.className="name";
name.innerText=c.name;

wrap.appendChild(div);
wrap.appendChild(hex);
wrap.appendChild(name);

box.appendChild(wrap);
});

let c=getContent(d.season,d.undertone,d.contrast);

document.getElementById("formal").innerText=c.formal;
document.getElementById("casual").innerText=c.casual;
document.getElementById("grooming").innerText=c.grooming;
document.getElementById("do").innerText=c.do;
document.getElementById("avoid").innerText=c.avoid;
}

function downloadPDF(){
html2pdf().from(document.getElementById("report")).save("Haneul_Report.pdf");
}

window.onload=loadReport;

</script>

</body>
</html>
