<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Report</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div id="report" class="page">

<h2>Haneul Palette Report</h2>

<div class="section">
<p>Undertone: <span id="undertone"></span></p>
<p>Season: <span id="season"></span></p>
<p>Contrast: <span id="contrast"></span></p>
</div>

<div class="section">
<h3>Palette</h3>
<div id="palette" class="palette"></div>
</div>

<div class="section">
<h3>Styling</h3>
<p id="formal"></p>
<p id="casual"></p>
</div>

<div class="section">
<h3>Grooming</h3>
<p id="grooming"></p>
</div>

<div class="section">
<h3>Do & Don't</h3>
<p id="do"></p>
<p id="avoid"></p>
</div>

</div>

<button onclick="downloadPDF()">Download PDF</button>

<script>

// SAMPLE palette (expand same way for all 16)
function getPalette(season){

const data={
"Soft Autumn":["#A67B5B","#C2A083","#E6C7A8","#8B6F47","#B08968","#DDB892"],
"Cool Summer":["#6FA3EF","#A7C7E7","#C3D9F1","#8BB8D4","#B0D0E8"],
"Bright Winter":["#FF0000","#0000FF","#00FF00","#FFFFFF","#000000"]
};

return data[season]||data["Soft Autumn"];
}

// 🔥 FULL DYNAMIC CONTENT
function getContent(season){

const content={
"Soft Autumn":{
formal:"Wear warm beige, olive, and soft brown outfits.",
casual:"Peach, cream, and muted greens.",
grooming:"Caramel and soft brown tones.",
do:"Stick to warm muted colors.",
avoid:"Avoid neon and black."
},
"Cool Summer":{
formal:"Cool grey and blue suits.",
casual:"Lavender, soft blue.",
grooming:"Ash brown tones.",
do:"Stay cool toned.",
avoid:"Avoid warm shades."
},
"Bright Winter":{
formal:"Black-white contrast outfits.",
casual:"Bright red and blue.",
grooming:"Jet black hair tones.",
do:"Use bold contrast.",
avoid:"Avoid muted tones."
}
};

return content[season]||content["Soft Autumn"];
}

function load(){

let d=JSON.parse(localStorage.getItem("reportData"));

document.getElementById("undertone").innerText=d.undertone;
document.getElementById("season").innerText=d.season;
document.getElementById("contrast").innerText=d.contrast;

// palette
let p=getPalette(d.season);
let box=document.getElementById("palette");

p.forEach(c=>{
let div=document.createElement("div");
div.className="color";
div.style.background=c;
box.appendChild(div);
});

// content
let c=getContent(d.season);

document.getElementById("formal").innerText=c.formal;
document.getElementById("casual").innerText=c.casual;
document.getElementById("grooming").innerText=c.grooming;
document.getElementById("do").innerText=c.do;
document.getElementById("avoid").innerText=c.avoid;

}

function downloadPDF(){
html2pdf().from(document.getElementById("report")).save();
}

window.onload=load;

</script>

</body>
</html>
