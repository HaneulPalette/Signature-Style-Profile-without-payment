<script>
function load() {

    let d = JSON.parse(localStorage.getItem("report"));

    document.getElementById("season").innerText = d.season;
    document.getElementById("undertone").innerText = d.undertone;

    document.getElementById("recommend").innerText = d.recommend.formal;

    let box = document.getElementById("palette");

    d.palette.forEach(c => {
        let div = document.createElement("div");
        div.style.width = "50px";
        div.style.height = "50px";
        div.style.background = c;
        div.style.display = "inline-block";
        box.appendChild(div);
    });
}

window.onload = load;
</script>
