<!DOCTYPE html>
<html>
<head>
<title>Report</title>
</head>

<body>

<h2>Haneul Palette Report</h2>

<p id="undertone"></p>
<p id="season"></p>

<div id="palette"></div>

<p id="recommend"></p>

<button onclick="downloadPDF()">Download PDF</button>

<script>
function loadReport() {

    let data = JSON.parse(localStorage.getItem("reportData"));

    document.getElementById("undertone").innerText = data.undertone;
    document.getElementById("season").innerText = data.season;
    document.getElementById("recommend").innerText = data.recommend.formal;

    let box = document.getElementById("palette");

    data.palette.forEach(c => {
        let d = document.createElement("div");
        d.style.width = "40px";
        d.style.height = "40px";
        d.style.background = c;
        d.style.display = "inline-block";
        d.style.margin = "3px";
        box.appendChild(d);
    });
}

function downloadPDF() {
    window.print();
}

window.onload = loadReport;
</script>

</body>
</html>
