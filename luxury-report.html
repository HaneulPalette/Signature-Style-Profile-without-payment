<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haneul Palette Luxury Report</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    margin: 0;
    background: #f5f3ef;
    font-family: 'Noto Sans', sans-serif;
}

.page {
    width: 800px;
    margin: auto;
    background: #ffffff;
    padding: 50px;
}

.header {
    text-align: center;
}

.logo {
    width: 80px;
    margin-bottom: 10px;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    letter-spacing: 2px;
}

.subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 40px;
}

.section {
    margin-bottom: 30px;
}

.section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    border-bottom: 1px solid #e5e5e5;
    padding-bottom: 5px;
    margin-bottom: 15px;
}

.card {
    background: #fafafa;
    padding: 18px;
    border-radius: 10px;
}

.palette {
    display: grid;
    grid-template-columns: repeat(5,1fr);
    gap: 15px;
}

.color-box {
    text-align: center;
    font-size: 11px;
}

.color {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    margin: auto;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 40px;
}
</style>
</head>

<body>

<div id="report" class="page">

<div class="header">
    <img src="logo.png" class="logo">
    <div class="title">HANEUL PALETTE</div>
    <div class="subtitle">Personal Colour Analysis</div>
</div>

<div class="section">
    <div class="section-title">Client Profile</div>
    <div class="card">
        Undertone: <span id="undertone"></span><br>
        Season: <span id="season"></span><br>
        Contrast: <span id="contrast"></span>
    </div>
</div>

<div class="section">
    <div class="section-title">Refined Seasonal Palette</div>
    <div class="palette" id="palette"></div>
</div>

<div class="section">
    <div class="section-title">Style Guidance</div>
    <div class="card">
        <b>Formal:</b> <span id="formal"></span><br><br>
        <b>Casual:</b> <span id="casual"></span><br><br>
        <b>Grooming:</b> <span id="grooming"></span>
    </div>
</div>

<div class="section">
    <div class="section-title">Do’s & Don’ts</div>
    <div class="card">
        ✔ <span id="do"></span><br>
        ✖ <span id="avoid"></span>
    </div>
</div>

<div class="footer">
    © Haneul Palette | Elegant Colour Identity
</div>

</div>

<div style="text-align:center; margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

/* LOAD DATA */
window.onload=function(){

let d=JSON.parse(localStorage.getItem("reportData"));

document.getElementById("undertone").innerText=d.undertone;
document.getElementById("season").innerText=d.season;
document.getElementById("contrast").innerText=d.contrast;

let box=document.getElementById("palette");

getPalette(d.season).forEach(col=>{
let wrap=document.createElement("div");
wrap.className="color-box";

let c=document.createElement("div");
c.className="color";
c.style.background=col.hex;

let hex=document.createElement("div");
hex.innerText=col.hex;

let name=document.createElement("div");
name.innerText=col.name;

wrap.appendChild(c);
wrap.appendChild(hex);
wrap.appendChild(name);

box.appendChild(wrap);
});

};
