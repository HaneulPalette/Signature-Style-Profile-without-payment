<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haneul Palette Luxury Report</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #f5f3ef;
    font-family: 'Noto Sans', sans-serif;
}

.page {
    width: 794px;
    min-height: 1123px;
    margin: auto;
    background: #fff;
    padding: 60px 50px;
}

.header { text-align: center; }
.logo { width: 80px; margin-bottom: 10px; }
.title { font-family: 'Playfair Display'; font-size: 34px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 40px; }

.section { margin-bottom: 30px; }
.section-title {
    font-family: 'Playfair Display';
    font-size: 20px;
    border-bottom: 1px solid #ddd;
    margin-bottom: 10px;
}

.card {
    background: #fafafa;
    padding: 15px;
    border-radius: 10px;
}

.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
}

.color-box {
    width: 18%;
    text-align: center;
    font-size: 11px;
}

.color {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    margin: auto;
}

.footer {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 40px;
}
</style>
</head>

<body>

<div id="report" class="page">

<div class="header">
<img src="logo.png" class="logo">
<div class="title">HANEUL PALETTE</div>
<div class="subtitle">Luxury Colour Identity</div>
</div>

<div class="section">
<div class="section-title">Client Profile</div>
<div class="card">
Undertone: <span id="undertone"></span><br>
Season: <span id="season"></span><br>
Contrast: <span id="contrast"></span>
</div>
</div>

<div class="section">
<div class="section-title">Refined Seasonal Palette</div>
<div id="palette"></div>
</div>

<div class="section">
<div class="section-title">Style Guidance</div>
<div class="card">
Formal: <span id="formal"></span><br><br>
Casual: <span id="casual"></span><br><br>
Grooming: <span id="grooming"></span>
</div>
</div>

<div class="section">
<div class="section-title">Do’s & Don’ts</div>
<div class="card">
✔ <span id="do"></span><br>
✖ <span id="avoid"></span>
</div>
</div>

<div class="footer">© Haneul Palette</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

/* SAFE DEFAULT DATA */
function getData(){
let d = JSON.parse(localStorage.getItem("reportData"));

if(!d){
d = {
undertone:"Warm",
season:"Soft Autumn",
contrast:"Medium"
};
}

return d;
}

/* SIMPLE PALETTE (WORKING) */
function getPalette(){
return ["#A67B5B","#C2A083","#E6C7A8","#8B6F47","#B08968","#DDB892","#7F5539","#F5E6CC","#6B4F4F","#C9A27E"];
}

/* STYLE CONTENT */
function getContent(){
return {
formal:"Use well-fitted outfits in your palette.",
casual:"Mix 2–3 colors from your palette.",
grooming:"Choose natural tones matching your undertone.",
do:"Stay within your palette.",
avoid:"Avoid random bright colors."
};
}

/* RENDER PALETTE */
function renderPalette(colors){
let container = document.getElementById("palette");

colors.forEach(hex=>{
let box = document.createElement("div");
box.className="color-box";

let c = document.createElement("div");
c.className="color";
c.style.background=hex;

let txt = document.createElement("div");
txt.innerText=hex;

box.appendChild(c);
box.appendChild(txt);
container.appendChild(box);
});
}

/* LOAD */
window.onload=function(){

let d = getData();

document.getElementById("undertone").innerText = d.undertone;
document.getElementById("season").innerText = d.season;
document.getElementById("contrast").innerText = d.contrast;

renderPalette(getPalette());

let c = getContent();

document.getElementById("formal").innerText = c.formal;
document.getElementById("casual").innerText = c.casual;
document.getElementById("grooming").innerText = c.grooming;
document.getElementById("do").innerText = c.do;
document.getElementById("avoid").innerText = c.avoid;

}

/* PDF */
function downloadPDF(){
html2pdf().from(document.getElementById("report")).save();
}

</script>

</body>
</html>
