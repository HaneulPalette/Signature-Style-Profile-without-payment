<script>

function loadReport() {

    let data = JSON.parse(localStorage.getItem("reportData"));

    document.getElementById("name").innerText = data.name;
    document.getElementById("undertone").innerText = data.undertone;
    document.getElementById("season").innerText = data.season;
    document.getElementById("recommend").innerText = data.recommend;
    document.getElementById("avoid").innerText = data.avoid;

    let palette = document.getElementById("palette");
    palette.innerHTML = "";

    data.colors.forEach(c => {
        let div = document.createElement("div");
        div.className = "color";
        div.style.background = c;
        palette.appendChild(div);
    });
}

window.onload = loadReport;

/* PDF DOWNLOAD */
function downloadPDF() {
    html2pdf().from(document.getElementById("report")).save("Haneul_Signature_Report.pdf");
}

</script>

<!-- ADD BUTTON -->
<div style="text-align:center; margin:20px;">
    <button onclick="downloadPDF()">Download PDF</button>
</div>
