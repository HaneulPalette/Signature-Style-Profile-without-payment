<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Noto+Sans&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    margin:0;
    background:#f5f3ef;
    font-family:'Noto Sans', sans-serif;
}

.page {
    width:800px;
    margin:auto;
    background:#fff;
    padding:50px;
}

/* Header */
.header{text-align:center;}
.logo{width:80px;}
.title{font-family:'Playfair Display';font-size:32px;}
.subtitle{font-size:12px;color:#777;margin-bottom:30px;}

/* Sections */
.section{margin-bottom:30px;}
.section-title{
    font-family:'Playfair Display';
    font-size:18px;
    border-bottom:1px solid #eee;
    margin-bottom:10px;
}

/* Cards */
.card{
    background:#fafafa;
    padding:15px;
    border-radius:10px;
}

/* Palette */
.palette{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}
.color{
    width:50px;
    height:50px;
    border-radius:6px;
}

/* Footer */
.footer{
    text-align:center;
    font-size:12px;
    color:#aaa;
    margin-top:40px;
}
</style>

</head>

<body>

<div id="report" class="page">

<div class="header">
    <img src="logo.png" class="logo">
    <div class="title">HANEUL PALETTE</div>
    <div class="subtitle">Signature Style Profile</div>
</div>

<!-- CLIENT -->
<div class="section">
<div class="section-title">Client Profile</div>
<div class="card">
Undertone: <span id="undertone"></span><br>
Season: <span id="season"></span><br>
Contrast: <span id="contrast"></span>
</div>
</div>

<!-- PALETTE -->
<div class="section">
<div class="section-title">Best Colours</div>
<div id="palette" class="palette"></div>
</div>

<!-- STYLING -->
<div class="section">
<div class="section-title">Styling Guide</div>
<div class="card">
<b>Formal:</b> <span id="formal"></span><br><br>
<b>Casual:</b> <span id="casual"></span>
</div>
</div>

<!-- GROOMING -->
<div class="section">
<div class="section-title">Grooming</div>
<div class="card" id="grooming"></div>
</div>

<!-- DO & DONT -->
<div class="section">
<div class="section-title">Do’s & Don’ts</div>
<div class="card">
<b>Do:</b> <span id="do"></span><br><br>
<b>Avoid:</b> <span id="avoid"></span>
</div>
</div>

<div class="footer">
© Haneul Palette
</div>

</div>

<div style="text-align:center;margin:20px;">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

function getPalette(season){

    return {
        "Bright Spring":["#FF5A36","#FFD700","#FF69B4","#FFA07A","#FF9966","#FFE066","#FFB347","#FF7F50","#FFD27F","#FFF1CC"],
        "Soft Autumn":["#A67B5B","#C2A083","#E6C7A8","#8B6F47","#B08968","#DDB892","#7F5539","#F5E6CC","#6B4F4F","#C9A27E"],
        "Light Summer":["#DCE6F1","#E3EDF7","#BFD7EA","#C9D6DF","#A9BCD0","#EAF2F8","#D0E1F9","#B8C6D1","#E5ECF4","#C3D3E3"],
        "True Winter":["#000","#fff","#FF0000","#0000FF","#00FFFF","#1C1C1C","#2F2F2F","#3A3A3A","#8B0000","#191970"]
    }[season] || ["#ccc"];
}

function loadReport(){

    let d = JSON.parse(localStorage.getItem("reportData"));

    document.getElementById("undertone").innerText = d.undertone;
    document.getElementById("season").innerText = d.season;
    document.getElementById("contrast").innerText = d.contrast;

    // palette
    let box = document.getElementById("palette");
    getPalette(d.season).forEach(c=>{
        let div=document.createElement("div");
        div.className="color";
        div.style.background=c;
        box.appendChild(div);
    });

    // styling
    document.getElementById("formal").innerText =
    "Elegant structured outfits in your seasonal tones.";

    document.getElementById("casual").innerText =
    "Soft coordinated everyday colors.";

    // grooming
    document.getElementById("grooming").innerText =
    "Choose hair tones that match your undertone.";

    // do/don’t
    document.getElementById("do").innerText =
    "Wear colors aligned with your natural harmony.";

    document.getElementById("avoid").innerText =
    "Avoid neon and opposite undertone colors.";
}

function downloadPDF(){
    html2pdf().from(document.getElementById("report")).save("Haneul_Report.pdf");
}

window.onload = loadReport;

</script>

</body>
</html>
